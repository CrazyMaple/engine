syntax = "proto3";

package engine.proto;
option go_package = "engine/proto";

// PID Actor 进程标识
message PID {
  string address = 1;  // 节点地址 "host:port"，本地 Actor 为空
  string id = 2;       // Actor 唯一标识
}

// MessageType 消息类型
enum MessageType {
  USER = 0;    // 用户消息
  SYSTEM = 1;  // 系统消息
}

// RemoteMessage 远程消息封装
message RemoteMessage {
  PID target = 1;           // 目标 Actor
  PID sender = 2;           // 发送者
  bytes payload = 3;        // 序列化后的消息体
  MessageType msg_type = 4; // 消息类型
  string type_name = 5;     // 消息类型名称，用于反序列化
  int32 protocol_version = 6; // 协议版本号
}

// RemoteMessageBatch 批量远程消息
message RemoteMessageBatch {
  repeated RemoteMessage messages = 1;
}
