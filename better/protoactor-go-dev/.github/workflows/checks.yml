name: checks 
on:
  - pull_request
  - workflow_dispatch
env:

  TERM: xterm
  REVIVE_FORCE_COLOR: 1

jobs:
  test:
    name: run-testcases
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go_version: ['1.25.2']
    # services:
    #   redis:
    #     image: redis:5.0-alpine
    #     ports: 
    #       - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go_version }}
          cache: true
      - name: start services
        run: docker compose up -d
      - name: build
        run: go build ./...
      - name: build examples
        run: |
          find ./examples -name go.mod -execdir sh -c 'go mod tidy && go build ./...' \;
      - name: run testcases
        run: make test2
      - name: benchmark
        run: make bench
      - name: linter
        run: make lint
      - name: vet
        run: make vet


